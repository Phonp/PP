<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Beauti Drink Survey 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Noto Sans Thai',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);
  background-attachment:fixed;
  display:flex;
  justify-content:center;
  align-items:flex-start;   /* FIX: ไม่ clip ปุ่มล่าง */
  padding:20px 16px 40px;
}

#app{width:100%;max-width:440px}

.card{
  background:#fff;
  border-radius:28px;
  padding:28px 22px 26px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:up .3s ease;
}
@keyframes up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* progress dots */
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:4px;background:#e5e7eb;transition:all .3s;flex-shrink:0}
.dot.on{background:#7c3aed;width:22px}
.dot.ok{background:#10b981}

/* question */
.qe{font-size:52px;text-align:center;display:block;margin-bottom:8px}
.qt{font-size:20px;font-weight:900;text-align:center;color:#111;margin-bottom:4px}
.qh{font-size:13px;color:#9ca3af;text-align:center;margin-bottom:18px;min-height:18px}

/* option buttons */
.grid{display:grid;gap:9px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}

.opt{
  border:2px solid #e5e7eb;
  border-radius:14px;
  padding:13px 8px;
  cursor:pointer;
  text-align:center;
  background:#fafafa;
  transition:all .15s;
  user-select:none;
  -webkit-user-select:none;
}
.opt:active{transform:scale(.95)}
.oe{font-size:26px;display:block;margin-bottom:4px;pointer-events:none}
.ol{font-size:13px;font-weight:700;color:#374151;line-height:1.3;pointer-events:none}
.opt:hover{border-color:#a855f7;background:#faf5ff}
.opt.sel{
  border:2px solid transparent;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  transform:scale(1.03);
}
.opt.sel .ol{color:#fff}

/* stars */
.stars{display:flex;justify-content:center;gap:6px;margin:16px 0 6px;flex-wrap:wrap}
.star{
  font-size:42px;cursor:pointer;
  filter:grayscale(1);opacity:.3;
  transition:all .15s;
  display:inline-block;
}
.star:hover,.star.on{filter:none;opacity:1;transform:scale(1.15)}
.star-lbl{text-align:center;font-size:14px;font-weight:700;min-height:22px;color:#9ca3af}
.star-lbl.good{color:#10b981}

/* next button */
.btn-n{
  width:100%;padding:15px;margin-top:16px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;border:none;border-radius:14px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:16px;font-weight:800;
  cursor:pointer;
  display:none;
  transition:all .2s;
}
.btn-n.show{display:block;animation:fup .2s ease}
@keyframes fup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.btn-n:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4)}

/* textarea */
textarea{
  width:100%;border:2px solid #e5e7eb;border-radius:12px;
  padding:13px;font-family:'Noto Sans Thai',sans-serif;
  font-size:15px;resize:none;outline:none;color:#374151;
  transition:border-color .2s;
}
textarea:focus{border-color:#7c3aed}
.skip{text-align:center;margin-top:10px;font-size:13px;color:#9ca3af;cursor:pointer}
.skip:hover{color:#7c3aed}

/* welcome */
.wl{text-align:center}
.wl-ico{font-size:72px;display:block;margin-bottom:12px;animation:bng .5s ease}
@keyframes bng{0%{transform:scale(.4)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.wl-t1{font-size:28px;font-weight:900;color:#111}
.wl-t2{font-size:18px;font-weight:800;color:#7c3aed;margin-bottom:12px}
.wl-sub{font-size:15px;color:#6b7280;line-height:1.7;margin-bottom:16px}
.badge{
  display:inline-block;background:#fef3c7;color:#92400e;
  padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:20px;
}
.btn-start{
  width:100%;padding:17px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;border:none;border-radius:16px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:18px;font-weight:900;cursor:pointer;transition:all .2s;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.4)}

/* done */
.done-screen{text-align:center}
.done-ico{font-size:72px;display:block;margin-bottom:12px;animation:spin .5s ease}
@keyframes spin{from{transform:rotate(-15deg)scale(.5)}to{transform:rotate(0)scale(1)}}
.done-t{font-size:26px;font-weight:900;color:#111;margin-bottom:6px}
.done-s{font-size:15px;color:#6b7280;line-height:1.7;margin-bottom:20px}
.summary-box{
  background:#f9fafb;border-radius:16px;padding:16px;
  margin-bottom:18px;text-align:left;
}
.sum-row{display:flex;gap:8px;padding:5px 0;font-size:14px;color:#374151;align-items:flex-start;
  border-bottom:1px solid #f3f4f6}
.sum-row:last-child{border-bottom:none}
.sum-label{font-weight:700;color:#7c3aed;flex-shrink:0;min-width:80px}
.sum-val{flex:1;line-height:1.4}
.btn-line{
  width:100%;padding:15px;
  background:#06C755;color:#fff;border:none;border-radius:14px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .2s;
}
.btn-line:hover{background:#05a847}
.btn-copy2{
  width:100%;padding:13px;
  background:#f3f4f6;color:#374151;border:none;border-radius:14px;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;
  transition:background .2s;
}
.btn-copy2:hover{background:#e5e7eb}
.copy-ok2{font-size:13px;color:#10b981;font-weight:700;display:none;margin-bottom:8px}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---- คำถาม ---- */
const Q=[
  {id:'gender', e:'💁', q:'เธอเป็นใคร?', type:'single', g:'g3',
    opts:[{e:'👩',l:'หญิง'},{e:'👨',l:'ชาย'},{e:'🌈',l:'ไม่ระบุ'}]},

  {id:'age', e:'🎂', q:'อายุเท่าไหร่?', type:'single', g:'g2',
    opts:[{e:'🧒',l:'14–17'},{e:'👦',l:'18–21'},{e:'🧑',l:'22–25'},{e:'👤',l:'26+'}]},

  {id:'fav', e:'🥤', q:'ตอนนี้ชอบดื่มอะไร?', h:'เลือกได้ 3 อย่าง', type:'multi', max:3, g:'g2',
    opts:[{e:'☕',l:'กาแฟ'},{e:'🧋',l:'ชาไข่มุก'},{e:'⚡',l:'Energy drink'},
          {e:'🍵',l:'Matcha'},{e:'🍊',l:'น้ำผลไม้'},{e:'💎',l:'Collagen drink'},
          {e:'🫧',l:'Sparkling'},{e:'🌿',l:'สมุนไพร'}]},

  {id:'flavor', e:'😋', q:'ชอบรสแบบไหน?', h:'เลือกได้ 2 อย่าง', type:'multi', max:2, g:'g2',
    opts:[{e:'🍃',l:'หวานน้อย'},{e:'🍋',l:'หวานเปรี้ยว'},{e:'🍑',l:'ผลไม้หอม'},
          {e:'🥛',l:'ครีมมี่'},{e:'☕',l:'ขมหอม'},{e:'🫧',l:'มีฟอง'}]},

  {id:'benefit', e:'✨', q:'อยากได้อะไรจากเครื่องดื่ม?', h:'เลือกได้ 3 อย่าง', type:'multi', max:3, g:'g2',
    opts:[{e:'🌟',l:'ผิวกระจ่าง'},{e:'💧',l:'หน้าชุ่มชื่น'},{e:'⚡',l:'พลังงาน'},
          {e:'🎯',l:'โฟกัสดี'},{e:'🌿',l:'ดีท็อก'},{e:'🔥',l:'ลดน้ำหนัก'}]},

  {id:'budget', e:'💰', q:'ราคาที่โอเคต่อขวด?', type:'single', g:'g2',
    opts:[{e:'🪙',l:'≤35 บาท'},{e:'💵',l:'36–60 บาท'},{e:'💴',l:'61–100 บาท'},{e:'💳',l:'100+ บาท'}]},

  {id:'channel', e:'🛒', q:'ซื้อจากที่ไหนบ่อยสุด?', h:'เลือกได้ 2 ที่', type:'multi', max:2, g:'g2',
    opts:[{e:'🏪',l:'7-Eleven'},{e:'🛍️',l:'ซูเปอร์มาร์เก็ต'},{e:'📱',l:'Shopee/Lazada'},
          {e:'🎵',l:'TikTok Shop'},{e:'☕',l:'คาเฟ่'},{e:'💊',l:'Watsons/Boots'}]},

  {id:'interest', e:'⭐', q:'Beauti Drink น่าสนใจแค่ไหน?',
    h:'เครื่องดื่มบำรุงผิว รสชาติดี', type:'rating'},

  {id:'note', e:'💬', q:'อยากบอกอะไรเราไหม?',
    h:'ไม่บังคับ — เราอยากฟัง! 🙏', type:'text'},
];

const STAR_LBL={1:'ยังไม่สนใจเลย 😐',2:'พอสนใจนิดหน่อย',3:'น่าสนใจดี 🙂',4:'อยากลองมาก! 😍',5:'อยากได้เลย! 🔥'};

let step=0, A={};

/* ---- helpers ---- */
function dots(){
  return '<div class="dots">'+Q.map((_,i)=>{
    const n=i+1, cls=n<step?'ok':n===step?'on':'';
    return`<div class="dot ${cls}"></div>`;
  }).join('')+'</div>';
}

/* ---- actions ---- */
function pick(id,val){
  A[id]=val;
  setTimeout(()=>{step++;render();},350);
}
function toggle(id,val,max){
  if(!A[id])A[id]=[];
  const i=A[id].indexOf(val);
  if(i>=0) A[id].splice(i,1);
  else if(A[id].length<max) A[id].push(val);
  render();
}
function pickStar(n){
  A.interest=n;
  setTimeout(()=>{step++;render();},350);
}
function goNext(){step++;render();}
function doSubmit(){
  A.ts=new Date().toISOString();
  try{
    const all=JSON.parse(localStorage.getItem('bd')||'[]');
    all.push(A);
    localStorage.setItem('bd',JSON.stringify(all));
  }catch(e){}
  step=10; render();
}

/* ---- render ---- */
function render(){
  const app=document.getElementById('app');

  /* welcome */
  if(step===0){
    app.innerHTML=`<div class="card"><div class="wl">
      <span class="wl-ico">💖</span>
      <div class="wl-t1">Beauti Drink</div>
      <div class="wl-t2">แบบสอบถาม</div>
      <div class="wl-sub">ช่วยเราสร้างเครื่องดื่มในฝันของเธอ!<br>ตอบสนุกๆ ไม่กี่คลิก 🌈</div>
      <div class="badge">⏱ ใช้เวลาแค่ 2 นาที</div><br>
      <button class="btn-start" id="btnStart">เริ่มเลย! 🚀</button>
    </div></div>`;
    document.getElementById('btnStart').onclick=()=>{step=1;render();};
    return;
  }

  /* done */
  if(step===10){
    const stars='⭐'.repeat(A.interest||0);
    const favList=(A.fav||[]).join(', ')||'—';
    const benList=(A.benefit||[]).join(', ')||'—';

    let code='';
    try{code=btoa(unescape(encodeURIComponent(JSON.stringify(A))));}
    catch(e){try{code=btoa(JSON.stringify(A));}catch(e2){code='error';}}

    const lineMsg=encodeURIComponent(
      `💖 Beauti Drink Survey\n`+
      `เพศ: ${A.gender||'—'} | อายุ: ${A.age||'—'}\n`+
      `ชอบดื่ม: ${favList}\n`+
      `อยากได้: ${benList}\n`+
      `ราคา: ${A.budget||'—'} | ซื้อที่: ${(A.channel||[]).join(', ')||'—'}\n`+
      `ให้คะแนน: ${stars}(${A.interest||0}/5)\n`+
      (A.note?`ความคิดเห็น: ${A.note}\n`:'')+
      `[Code:${code.slice(0,20)}...]`
    );

    app.innerHTML=`<div class="card"><div class="done-screen">
      <span class="done-ico">🎉</span>
      <div class="done-t">ขอบคุณมากเลย!</div>
      <div class="done-s">ข้อมูลของเธอจะช่วยสร้าง<br>Beauti Drink ที่ดีที่สุด 💖</div>

      <div class="summary-box" id="sumBox">
        <div class="sum-row"><span class="sum-label">เพศ</span><span class="sum-val">${A.gender||'—'}</span></div>
        <div class="sum-row"><span class="sum-label">อายุ</span><span class="sum-val">${A.age||'—'}</span></div>
        <div class="sum-row"><span class="sum-label">ชอบดื่ม</span><span class="sum-val">${favList}</span></div>
        <div class="sum-row"><span class="sum-label">รส</span><span class="sum-val">${(A.flavor||[]).join(', ')||'—'}</span></div>
        <div class="sum-row"><span class="sum-label">อยากได้</span><span class="sum-val">${benList}</span></div>
        <div class="sum-row"><span class="sum-label">ราคา</span><span class="sum-val">${A.budget||'—'}</span></div>
        <div class="sum-row"><span class="sum-label">ซื้อที่</span><span class="sum-val">${(A.channel||[]).join(', ')||'—'}</span></div>
        <div class="sum-row"><span class="sum-label">คะแนน</span><span class="sum-val">${stars} (${A.interest||0}/5)</span></div>
        ${A.note?`<div class="sum-row"><span class="sum-label">บอกเรา</span><span class="sum-val">${A.note}</span></div>`:''}
      </div>

      <button class="btn-line" id="btnLine">
        <span>💚</span> แชร์ให้แอดมินทาง LINE
      </button>
      <button class="btn-copy2" id="btnCopyCode">📋 คัดลอก Code</button>
      <div class="copy-ok2" id="copyOk2">✅ คัดลอกแล้ว! ส่งให้แอดมินได้เลย</div>
    </div></div>`;

    document.getElementById('btnLine').onclick=()=>{
      window.open('https://line.me/R/msg/text/?'+lineMsg,'_blank');
    };
    document.getElementById('btnCopyCode').onclick=()=>{
      navigator.clipboard.writeText(code).catch(()=>{
        const ta=document.createElement('textarea');
        ta.value=code; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); ta.remove();
      });
      document.getElementById('copyOk2').style.display='block';
    };

    boom(); return;
  }

  /* questions */
  const q=Q[step-1];
  let body='';

  if(q.type==='single'){
    body=`<div class="grid ${q.g}" id="optGrid">`;
    q.opts.forEach((o,idx)=>{
      const s=A[q.id]===o.l?' sel':'';
      body+=`<div class="opt${s}" data-action="single" data-idx="${idx}">
        <span class="oe">${o.e}</span><div class="ol">${o.l}</div></div>`;
    });
    body+=`</div>`;
  }

  if(q.type==='multi'){
    const cur=A[q.id]||[];
    body=`<div class="grid ${q.g}" id="optGrid">`;
    q.opts.forEach((o,idx)=>{
      const s=cur.includes(o.l)?' sel':'';
      body+=`<div class="opt${s}" data-action="multi" data-idx="${idx}">
        <span class="oe">${o.e}</span><div class="ol">${o.l}</div></div>`;
    });
    body+=`</div>`;
    const can=(cur.length>=1);
    body+=`<button class="btn-n${can?' show':''}" id="btnNext">ถัดไป →</button>`;
  }

  if(q.type==='rating'){
    const cur=A.interest||0;
    const isGood=cur>=4;
    body=`<div class="stars" id="starRow">`;
    for(let i=1;i<=5;i++){
      body+=`<span class="star${i<=cur?' on':''}" data-star="${i}">⭐</span>`;
    }
    body+=`</div>`;
    body+=`<div class="star-lbl${isGood?' good':''}" id="starLbl">${cur?STAR_LBL[cur]:''}</div>`;
  }

  if(q.type==='text'){
    body=`<textarea id="noteArea" rows="4" placeholder="พิมพ์ได้เลย...">${A.note||''}</textarea>
    <button class="btn-n show" id="btnSubmit">ส่งเลย! 💖</button>
    <div class="skip" id="btnSkip">ข้ามได้เลย →</div>`;
  }

  app.innerHTML=`<div class="card">
    ${dots()}
    <span class="qe">${q.e}</span>
    <div class="qt">${q.q}</div>
    <div class="qh">${q.h||''}</div>
    ${body}
  </div>`;

  /* ---- attach event listeners after render (FIX: no inline onclick) ---- */
  if(q.type==='single'){
    document.querySelectorAll('[data-action="single"]').forEach(el=>{
      el.addEventListener('click',()=>{
        const idx=parseInt(el.dataset.idx);
        pick(q.id, q.opts[idx].l);
      });
    });
  }

  if(q.type==='multi'){
    document.querySelectorAll('[data-action="multi"]').forEach(el=>{
      el.addEventListener('click',()=>{
        const idx=parseInt(el.dataset.idx);
        toggle(q.id, q.opts[idx].l, q.max);
      });
    });
    const btnNext=document.getElementById('btnNext');
    if(btnNext) btnNext.addEventListener('click',goNext);
  }

  if(q.type==='rating'){
    document.querySelectorAll('[data-star]').forEach(el=>{
      el.addEventListener('click',()=>pickStar(parseInt(el.dataset.star)));
    });
  }

  if(q.type==='text'){
    const ta=document.getElementById('noteArea');
    if(ta) ta.addEventListener('input',()=>{A.note=ta.value;});
    const btnS=document.getElementById('btnSubmit');
    if(btnS) btnS.addEventListener('click',doSubmit);
    const btnSk=document.getElementById('btnSkip');
    if(btnSk) btnSk.addEventListener('click',doSubmit);
  }
}

/* ---- confetti ---- */
function boom(){
  const c=document.createElement('canvas');
  c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  document.body.appendChild(c);
  const ctx=c.getContext('2d');
  c.width=innerWidth; c.height=innerHeight;
  const cols=['#7c3aed','#ec4899','#3b82f6','#10b981','#f59e0b','#f472b6'];
  const ps=Array.from({length:120},()=>({
    x:Math.random()*c.width, y:-10-Math.random()*120,
    r:Math.random()*6+3,
    col:cols[Math.floor(Math.random()*cols.length)],
    vy:Math.random()*3+2, vx:Math.random()*2-1, a:1
  }));
  let t=0;
  (function anim(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.a-=.004;
      ctx.globalAlpha=Math.max(0,p.a);
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
    if(++t<200) requestAnimationFrame(anim); else c.remove();
  })();
}

render();
</script>
</body>
</html>
